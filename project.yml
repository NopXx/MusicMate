---
name: Musique
options:
  bundleIdPrefix: com.nopxx
  deploymentTarget:
    macOS: '26.0'
  developmentLanguage: en
  createIntermediateGroups: true
  postGenCommand: bash scripts/fix-icon-filetype.sh
settings:
  base:
    SWIFT_VERSION: '5.9'
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: '2'
    DEVELOPMENT_TEAM: H4M5HWBU2K
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: true
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Musique:
    type: application
    platform: macOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
    - path: Musique/Sources
    - path: AppIcon.icon
      type: folder
    info:
      path: Musique/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Musique
        CFBundleIconName: AppIcon
        NSAppleEventsUsageDescription: Musique needs permission to control Music to read playback state and send play/pause commands.
        NSAppleMusicUsageDescription: Musique reads the currently playing track info from Apple Music.
        NSAudioCaptureUsageDescription: Musique captures audio from Music.app to render the waveform visualizer.
        NSUserNotificationAlertStyle: alert
        LastFMAPIKey: $(LASTFM_API_KEY)
        LastFMAPISecret: $(LASTFM_API_SECRET)
    entitlements:
      path: Musique/Musique.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
        com.apple.security.network.client: true
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.application-groups:
        - group.com.nopxx.musique
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nopxx.musique
        GENERATE_INFOPLIST_FILE: false
        ENABLE_APP_SANDBOX: false
        SWIFT_OBJC_BRIDGING_HEADER: Musique/Musique-Bridging-Header.h
        CLANG_ENABLE_MODULES: 'YES'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
    - target: MusiqueWidget
    - sdk: ScriptingBridge.framework
  MusiqueWidget:
    type: app-extension
    platform: macOS
    sources:
    - path: MusiqueWidget
    info:
      path: MusiqueWidget/Info.plist
      properties:
        CFBundleDisplayName: Musique Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: MusiqueWidget/MusiqueWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
        - group.com.nopxx.musique
        com.apple.security.network.client: true
        com.apple.security.files.downloaded.read-only: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nopxx.musique.widget
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: true
  MusiqueTests:
    type: bundle.unit-test
    platform: macOS
    sources:
    - path: MusiqueTests
    dependencies:
    - target: Musique
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nopxx.musique.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  Musique:
    build:
      targets:
        Musique: all
        MusiqueWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
      - MusiqueTests
    archive:
      config: Release
